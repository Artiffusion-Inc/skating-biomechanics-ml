    - source: os.environ["API_KEY"]
      style: primary
      start: 0
      end: 21
  os.getenv("LOG_LEVEL", "INFO"):
    labels:
    - source: os.getenv("LOG_LEVEL", "INFO")
      style: primary
      start: 0
      end: 30
