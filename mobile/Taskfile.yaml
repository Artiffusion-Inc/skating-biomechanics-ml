version: '3'

tasks:
  gen:
    desc: Generate code (FlutterGen + build_runner)
    dir: mobile
    cmds:
      - dart run build_runner build --delete-conflicting-outputs

  analyze:
    desc: Analyze and format check
    dir: mobile
    cmds:
      - flutter analyze
      - dart format --output=none --set-exit-if-changed lib/ test/

  test:
    desc: Run all tests
    dir: mobile
    cmds:
      - flutter test

  test:unit:
    desc: Run unit tests only
    dir: mobile
    cmds:
      - flutter test test/

  test:integration:
    desc: Run Patrol integration tests
    dir: mobile
    cmds:
      - patrol test --target integration_test/
