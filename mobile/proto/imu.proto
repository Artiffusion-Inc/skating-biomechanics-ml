syntax = "proto3";

message IMUSample {
  uint64 relative_timestamp_ms = 1;
  float acc_x = 2;
  float acc_y = 3;
  float acc_z = 4;
  float gyro_x = 5;
  float gyro_y = 6;
  float gyro_z = 7;
  float quat_w = 8;
  float quat_x = 9;
  float quat_y = 10;
  float quat_z = 11;
}

message IMUStream {
  repeated IMUSample samples = 1;
}
