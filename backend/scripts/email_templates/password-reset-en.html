<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset — SkateLab</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    .container { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; }
    .header { background: #1a1a2e; padding: 32px 24px; text-align: center; }
    .header h1 { color: #fff; font-size: 24px; margin: 0; }
    .body { padding: 32px 24px; }
    .body p { color: #333; font-size: 16px; line-height: 1.6; margin: 0 0 16px; }
    .btn { display: inline-block; background: #4f46e5; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; }
    .footer { padding: 16px 24px; text-align: center; color: #999; font-size: 13px; }
    .footer a { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SkateLab</h1>
    </div>
    <div class="body">
      <p>Hello!</p>
      <p>We received a request to reset your SkateLab password. Click the button below to set a new password:</p>
      <p style="text-align: center;">
        <a href="{{{RESET_URL}}}" class="btn">Reset Password</a>
      </p>
      <p>If you didn't request a password reset, you can safely ignore this email.</p>
      <p>This link expires in 1 hour.</p>
    </div>
    <div class="footer">
      <p>SkateLab — AI Figure Skating Coach</p>
    </div>
  </div>
</body>
</html>
