global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load recording + alert rules
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # GPU worker
  - job_name: "gpu-worker"
    static_configs:
      - targets: ["gpu-worker:8000"]
    metrics_path: /metrics
    scheme: http

  # If running GPU worker on host instead of container:
  # - job_name: "gpu-worker-local"
  #   static_configs:
  #     - targets: ["host.docker.internal:8000"]
