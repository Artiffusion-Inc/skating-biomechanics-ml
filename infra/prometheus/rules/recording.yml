groups:
  - name: inference_recording
    interval: 15s
    rules:
      # Request rate per status
      - record: job:inference_requests:rate5m
        expr: sum by (job, status) (rate(inference_requests_total[5m]))

      # Error rate percentage
      - record: job:inference_errors:rate5m
        expr: sum by (job) (rate(inference_requests_total{status="error"}[5m]))

      - record: job:inference_error_rate:percentage
        expr: |
          (job:inference_errors:rate5m / sum by (job) (rate(inference_requests_total[5m]))) * 100

      # P95 latency
      - record: job:inference_duration:p95
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(inference_duration_seconds_bucket[5m]))
          )

      # P99 latency
      - record: job:inference_duration:p99
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(inference_duration_seconds_bucket[5m]))
          )

      # Average active requests
      - record: job:active_requests:avg5m
        expr: avg_over_time(active_requests[5m])
