# Production deploy spec for podman kube play --replace
# Replaces compose.prod.yaml for CI/CD deploys.
# Uses envsubst for ${VAR} substitution before apply.
apiVersion: v1
kind: Pod
metadata:
  annotations:
    podman.io/restart-policy: always
  labels:
    app: skatelab
  name: skatelab
spec:
  containers:
    - args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
      image: docker.io/prom/prometheus:v3.3.0
      name: prometheus
      ports:
        - containerPort: 9090
          hostIP: 127.0.0.1
      volumeMounts:
        - mountPath: /etc/prometheus/prometheus.yml
          name: opt-skatelab-prometheus.yml-host-0
          readOnly: true
        - mountPath: /etc/prometheus/rules
          name: opt-skatelab-prometheus-rules-host-1
          readOnly: true
        - mountPath: /prometheus
          name: skatelab-prometheus-data-pvc
    - env:
        - name: POSTGRES_DB
          value: skatelab
        - name: POSTGRES_PASSWORD
          value: "${POSTGRES_PASSWORD}"
        - name: POSTGRES_USER
          value: skatelab
      image: docker.io/library/postgres:16-alpine
      name: postgres
      volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: skatelab-postgres-data-pvc
    - env:
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        - name: JWT_SECRET
          value: "${JWT_SECRET}"
        - name: LOG_LEVEL
          value: info
        - name: R2_ACCESS_KEY_ID
          value: "${R2_ACCESS_KEY_ID}"
        - name: R2_BUCKET
          value: "${R2_BUCKET}"
        - name: R2_ENDPOINT_URL
          value: "${R2_ENDPOINT_URL}"
        - name: R2_SECRET_ACCESS_KEY
          value: "${R2_SECRET_ACCESS_KEY}"
        - name: VALKEY_URL
          value: redis://127.0.0.1:6379/0
        - name: VASTAI_API_KEY
          value: "${VASTAI_API_KEY}"
        - name: RESEND_API_KEY
          value: "${RESEND_API_KEY}"
      image: ghcr.io/artiffusion-inc/skatelab-backend:latest
      name: backend
    - env:
        - name: NEXT_PUBLIC_API_URL
          value: /api
      image: ghcr.io/artiffusion-inc/skatelab-frontend:latest
      name: frontend
    - env:
        - name: CLOUDFLARE_API_TOKEN
          value: "${CLOUDFLARE_API_TOKEN}"
        - name: DOMAIN
          value: skatelab.ru
      image: ghcr.io/caddybuilds/caddy-cloudflare:latest
      name: caddy
      ports:
        - containerPort: 80
          hostPort: 80
        - containerPort: 443
          hostPort: 443
      volumeMounts:
        - mountPath: /etc/caddy/Caddyfile
          name: opt-skatelab-Caddyfile-host-2
          readOnly: true
        - mountPath: /data
          name: skatelab-caddy-data-pvc
        - mountPath: /config
          name: skatelab-caddy-config-pvc
    - image: docker.io/valkey/valkey:8-alpine
      name: valkey
      volumeMounts:
        - mountPath: /data
          name: skatelab-valkey-data-pvc
  volumes:
    - hostPath:
        path: /opt/skatelab/Caddyfile
        type: File
      name: opt-skatelab-Caddyfile-host-2
    - hostPath:
        path: /opt/skatelab/prometheus.yml
        type: File
      name: opt-skatelab-prometheus.yml-host-0
    - hostPath:
        path: /opt/skatelab/prometheus/rules
        type: Directory
      name: opt-skatelab-prometheus-rules-host-1
    - name: skatelab-caddy-config-pvc
      persistentVolumeClaim:
        claimName: skatelab_caddy-config
    - name: skatelab-caddy-data-pvc
      persistentVolumeClaim:
        claimName: skatelab_caddy-data
    - name: skatelab-postgres-data-pvc
      persistentVolumeClaim:
        claimName: skatelab_postgres-data
    - name: skatelab-prometheus-data-pvc
      persistentVolumeClaim:
        claimName: skatelab_prometheus-data
    - name: skatelab-valkey-data-pvc
      persistentVolumeClaim:
        claimName: skatelab_valkey-data
