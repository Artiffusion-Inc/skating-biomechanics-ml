name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - "ml/gpu_server/**"
      - ".github/workflows/container.yml"
      - "docs/**"
      - "research/**"
      - "experiments/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      python-version: "3.11"
      skip-docker: true
    secrets: inherit

  build-frontend:
    name: Build Frontend Image
    needs: ci
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase GHCR owner
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build & push Frontend
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: frontend
          file: frontend/Containerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/skating-frontend:latest
            ghcr.io/${{ steps.ghcr.outputs.owner }}/skating-frontend:${{ github.sha }}

      - name: Frontend build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Frontend Build

          | Metric | Value |
          |--------|-------|
          | Status | \`${{ steps.build.outcome }}\` |
          | Image | \`ghcr.io/${{ steps.ghcr.outputs.owner }}/skating-frontend:${{ github.sha }}\` |

          EOF

  build-backend:
    name: Build Backend Image
    needs: ci
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase GHCR owner
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build & push Backend
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: backend/Containerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/skatelab-backend:latest
            ghcr.io/${{ steps.ghcr.outputs.owner }}/skatelab-backend:${{ github.sha }}

      - name: Backend build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Backend Build

          | Metric | Value |
          |--------|-------|
          | Status | \`${{ steps.build.outcome }}\` |
          | Image | \`ghcr.io/${{ steps.ghcr.outputs.owner }}/skatelab-backend:${{ github.sha }}\` |

          EOF

  deploy:
    name: Deploy to VPS
    needs: [build-frontend, build-backend]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase GHCR owner
        id: ghcr
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Sync deploy files to VPS
        id: sync
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/deploy.yaml,infra/Caddyfile,infra/prometheus.yml,infra/prometheus/rules"
          target: "/opt/skating-app/"
          strip_components: 1

      - name: Login to GHCR
        id: login
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 1m
          script: |
            echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy pod
        id: deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd /opt/skating-app
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export DATABASE_URL="postgresql+asyncpg://skating:${{ secrets.POSTGRES_PASSWORD }}@127.0.0.1:5432/skating"
            export R2_ENDPOINT_URL="${{ secrets.CF_R2_ENDPOINT_URL }}"
            export R2_ACCESS_KEY_ID="${{ secrets.CF_R2_ACCESS_KEY_ID }}"
            export R2_SECRET_ACCESS_KEY="${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
            export R2_BUCKET="${{ secrets.CF_R2_BUCKET }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export VASTAI_API_KEY="${{ secrets.VASTAI_API_KEY }}"
            export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
            export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
            export TAG="${{ github.sha }}"
            export GHCR_OWNER="${{ steps.ghcr.outputs.owner }}"

            envsubst < deploy.yaml > deploy-rendered.yaml
            sed -i "s|ghcr.io/artiffusion-inc/skatelab-backend:latest|ghcr.io/${GHCR_OWNER}/skatelab-backend:${TAG}|g" deploy-rendered.yaml
            sed -i "s|ghcr.io/artiffusion-inc/skating-frontend:latest|ghcr.io/${GHCR_OWNER}/skating-frontend:${TAG}|g" deploy-rendered.yaml

            # Clean up old compose containers and pods before kube play
            podman stop $(podman ps -aq --filter name=skating-app) 2>/dev/null || true
            podman rm -f $(podman ps -aq --filter name=skating-app) 2>/dev/null || true
            podman pod rm -f $(podman pod ps -q --filter name=skating-app) 2>/dev/null || true

            podman kube play --replace deploy-rendered.yaml

      - name: Run database migrations
        id: migrate
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 1m
          script: |
            sleep 10
            podman exec skating-app-backend alembic upgrade head

      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            timeout 120 bash -c '
              while true; do
                status=$(podman pod ps --format "{{.Name}}\t{{.Status}}" | grep skating-app | awk "{print \$2}")
                if [ "$status" = "Running" ]; then
                  if podman exec skating-app-backend \
                    bash -c "python -c \"import urllib.request; urllib.request.urlopen(\\\"http://127.0.0.1:8000/api/v1/health\\\", timeout=2)\"" 2>/dev/null; then
                    echo "All services healthy"
                    exit 0
                  fi
                fi
                sleep 10
              done
            '

      - name: Cleanup
        id: cleanup
        if: always()
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 1m
          script: |
            podman image prune -f --filter "until=24h" > /dev/null 2>&1

      - name: Deploy summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Deploy

          | Step | Status |
          |------|--------|
          | Sync files | \`${{ steps.sync.outcome }}\` |
          | Login GHCR | \`${{ steps.login.outcome }}\` |
          | Kube play replace | \`${{ steps.deploy.outcome }}\` |
          | Migrations | \`${{ steps.migrate.outcome }}\` |
          | Health check | \`${{ steps.health.outcome }}\` |
          | Cleanup | \`${{ steps.cleanup.outcome }}\` |

          EOF

  deploy-summary:
    name: Pipeline Summary
    needs: [ci, build-frontend, build-backend, deploy]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    steps:
      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Pipeline Overview

          | Stage | Status |
          |-------|--------|
          | CI | \`${{ needs.ci.result }}\` |
          | Build Frontend | \`${{ needs.build-frontend.result }}\` |
          | Build Backend | \`${{ needs.build-backend.result }}\` |
          | Deploy | \`${{ needs.deploy.result }}\` |

          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** @${{ github.actor }}
          **Branch:** \`${{ github.ref_name }}\`

          EOF

          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            echo "::error::Deploy pipeline failed"
            exit 1
          fi
