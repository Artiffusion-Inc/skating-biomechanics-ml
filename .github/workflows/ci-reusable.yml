name: CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        default: "3.11"
        type: string
      skip-docker:
        required: false
        default: false
        type: boolean
    outputs:
      ci-passed:
        description: "Whether all CI checks passed"
        value: ${{ jobs.ci-passed.outputs.result }}

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ml: ${{ steps.filter.outputs.ml }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - "backend/**"
              - "ml/src/**"
              - "ml/tests/**"
              - "pyproject.toml"
              - "backend/pyproject.toml"
              - "ml/pyproject.toml"
            ml:
              - "ml/**"
              - "pyproject.toml"
              - "ml/pyproject.toml"
            frontend:
              - "frontend/**"
            docker:
              - "backend/Containerfile"
              - "frontend/Containerfile"
              - ".containerignore"
              - "infra/**"

  lint:
    name: Lint (ruff)
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --all-packages --frozen --dev
      - name: Ruff format
        run: uv run ruff format --check backend/ ml/
      - name: Ruff check
        run: uv run ruff check backend/ ml/ --output-format=github

  typecheck:
    name: Type Check (basedpyright)
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --all-packages --frozen --dev
      - name: basedpyright
        run: uv run basedpyright --level error backend/app

  ast-grep:
    name: Lint (ast-grep)
    needs: [changes]
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ast-grep/action@v1.5.0
        with:
          config: sgconfig.yml
          paths: "backend/ ml/ frontend/"

  test:
    name: Tests
    needs: [changes, lint]
    if: needs.changes.outputs.python == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --all-packages --frozen --dev
      - name: Debug editable install
        run: |
          uv run python -c "
          import sys, pkgutil
          print('sys.path:')
          for p in sys.path:
              print(' ', p)
          print()
          import src
          print('src.__file__:', src.__file__)
          print('src.__path__:', getattr(src, '__path__', 'N/A'))
          print()
          found = False
          for importer, name, ispkg in pkgutil.iter_modules(src.__path__):
              print('  module:', name, 'ispkg:', ispkg)
              found = True
          if not found:
              print('  NO modules found under src!')
          print()
          print('Editable .pth files:')
          import glob
          for p in glob.glob('/home/runner/_work/**/*.pth', recursive=True):
              if 'editable' in p:
                  print(' ', p)
          "
      - name: pytest
        env:
          PYTHONPATH: ml:backend:.
        run: >
          uv run pytest backend/tests/
          ml/tests/test_device.py ml/tests/test_types.py ml/tests/test_gap_filling.py
          ml/tests/test_worker_metrics.py ml/tests/test_tracked_extraction.py
          ml/tests/test_projection.py ml/tests/test_pipeline_parallel.py
          ml/tests/alignment/ ml/tests/analysis/
          ml/tests/utils/test_gap_filling.py ml/tests/utils/test_geometry.py
          ml/tests/utils/test_geometry_numba.py ml/tests/utils/test_profiler.py
          ml/tests/utils/test_profiling.py ml/tests/utils/test_smoothing.py
          ml/tests/utils/test_smoothing_numba.py ml/tests/utils/test_video_writer_nvenc.py
          ml/tests/references/ ml/tests/pose_3d/ ml/tests/pose_estimation/ ml/tests/datasets/
          -v -m "not slow and not integration"
          --cov=backend/app --cov=ml/src
          --cov-report=xml --junitxml=junit.xml --tb=short
      - name: Upload coverage (backend)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: backend,ml
          name: python-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results (backend)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml

  smoke:
    name: Smoke Tests (ML inference)
    needs: [changes, test]
    if: needs.changes.outputs.ml == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Sync deps
        run: uv sync --all-packages --frozen --dev
      - name: pytest smoke
        run: uv run pytest ml/tests/smoke/ -v -m smoke --tb=short

  fe-lint:
    name: Lint (Biome)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Biome check
        working-directory: frontend
        run: bunx biome check .

  fe-typecheck:
    name: Type Check (tsc)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: tsc
        working-directory: frontend
        run: bun run typecheck

  fe-build:
    name: Build (Next.js)
    needs: [changes, fe-lint, fe-typecheck]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: next build
        working-directory: frontend
        run: ANALYZE=true bun run build 2>&1 | tee build.log
      - name: Bundle sizes summary
        if: always()
        working-directory: frontend
        run: |
          echo "### Bundle Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E '├|└|│' build.log >> "$GITHUB_STEP_SUMMARY" || echo "No bundle tree output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload bundle analyzer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-analyzer
          path: frontend/.next/analyze/
          retention-days: 14

  fe-test:
    name: Tests (Vitest)
    needs: [changes, fe-lint]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Vitest coverage
        working-directory: frontend
        run: bun run vitest run --coverage --reporter=junit --outputFile=test-report.junit.xml
      - name: Upload coverage (frontend)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          directory: frontend/coverage
          flags: frontend
          name: frontend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results (frontend)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/test-report.junit.xml

  docker-backend:
    name: Docker Build (Backend)
    needs: [changes, lint, typecheck, test]
    if: ${{ !inputs.skip-docker && needs.changes.outputs.docker == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build backend image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: backend/Containerfile
          push: false
          tags: skating-backend:ci

  docker-frontend:
    name: Docker Build (Frontend)
    needs: [changes, fe-lint, fe-typecheck, fe-build]
    if: ${{ !inputs.skip-docker && needs.changes.outputs.docker == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Build frontend image
        uses: useblacksmith/build-push-action@v2
        with:
          context: frontend
          file: frontend/Containerfile
          push: false
          tags: skating-frontend:ci

  ci-passed:
    name: CI Summary
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [changes, lint, typecheck, ast-grep, test, smoke, fe-lint, fe-typecheck, fe-build, fe-test, docker-backend, docker-frontend]
    if: always()
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - name: Check results & write summary
        id: check
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          SMOKE: ${{ needs.smoke.result }}
          FE_LINT: ${{ needs.fe-lint.result }}
          FE_TYPECHECK: ${{ needs.fe-typecheck.result }}
          FE_BUILD: ${{ needs.fe-build.result }}
          FE_TEST: ${{ needs.fe-test.result }}
          DOCKER_BACKEND: ${{ needs.docker-backend.result }}
          DOCKER_FRONTEND: ${{ needs.docker-frontend.result }}
          AST_GREP: ${{ needs.ast-grep.result }}
          CHANGES: ${{ needs.changes.result }}
        run: |
          FAILED=0

          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          check_job() {
            local name="$1" result="$2"
            if [[ "$result" == "success" || "$result" == "skipped" ]]; then
              echo "| :white_check_mark: ${name} | \`${result}\` |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| :x: ${name} | \`${result}\` |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          }

          check_job "Lint (ruff)" "$LINT"
          check_job "Type Check (basedpyright)" "$TYPECHECK"
          check_job "Tests" "$TEST"
          check_job "Smoke Tests" "$SMOKE"
          check_job "Lint (Biome)" "$FE_LINT"
          check_job "Type Check (tsc)" "$FE_TYPECHECK"
          check_job "Build (Next.js)" "$FE_BUILD"
          check_job "Tests (Vitest)" "$FE_TEST"
          check_job "Docker Build (Backend)" "$DOCKER_BACKEND"
          check_job "Docker Build (Frontend)" "$DOCKER_FRONTEND"
          echo "| :mag: ast-grep | \`${AST_GREP}\` (informational) |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$CHANGES" != "success" ]]; then
            echo "::error::changes detection failed"
            echo "result=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::CI failed"
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "### :x: CI Failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "### :white_check_mark: All CI checks passed" >> "$GITHUB_STEP_SUMMARY"
