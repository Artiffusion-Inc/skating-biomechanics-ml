name: Flutter CI

on:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: dart format --output=none --set-exit-if-changed lib/ test/

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test

  build-apk:
    needs: [analyze, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
      - run: flutter build apk --release
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
      - uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  patrol-test:
    needs: [build-apk]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build integration test APK
        run: |
          flutter build apk --debug \
            --target=integration_test/permissions_test.dart \
            --dart-define PATROL_INTEGRATION_TEST=1
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
      - name: Run Patrol tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: mobile
          script: flutter test integration_test/permissions_test.dart
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
